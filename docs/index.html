<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テキスト・エンティティ抽出ツール</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-8HGNXTXT0Q"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-8HGNXTXT0Q');
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link rel="stylesheet" href="style.css">

<!-- 1. Supabase クライアント（最初に読み込む） -->
<script src="https://auth.dataviz.jp/lib/supabase.js"></script>

<!-- 2. 共通ヘッダー + 認証ロジック（supabase.js に依存） -->
<script src="https://auth.dataviz.jp/lib/dataviz-auth-client.js"></script>
</head>
<body>

<div class="header">
  <div>
    <h1 data-i18n="title"></h1>
    <p data-i18n="subtitle"></p>
  </div>
  <div class="lang-switch">
    <button data-lang="ja" class="active">日本語</button>
    <button data-lang="en">EN</button>
  </div>
</div>

<!-- ステッパー -->
<div class="stepper">
  <div class="step-tab active" data-step="0">
    <span class="step-num">1</span> <span data-i18n="step1"></span>
  </div>
  <div class="step-tab" data-step="1">
    <span class="step-num">2</span> <span data-i18n="step2"></span>
  </div>
  <div class="step-tab" data-step="2">
    <span class="step-num">3</span> <span data-i18n="step3"></span>
  </div>
</div>

<div class="main">

  <!-- Step 1: データ入力 -->
  <div class="step-panel active" id="step0">
    <div class="card">
      <h2 data-i18n="dataInput"></h2>

      <div class="header-option">
        <input type="checkbox" id="hasHeader" checked>
        <label for="hasHeader" data-i18n="hasHeader"></label>
      </div>

      <div class="input-tabs">
        <div class="input-tab active" data-input-tab="file" data-i18n="fileUpload"></div>
        <div class="input-tab" data-input-tab="text" data-i18n="textPaste"></div>
      </div>

      <div id="input-tab-file" class="input-tab-content active">
        <div class="drop-zone" id="dropZone">
          <p data-i18n="dropZone" data-i18n-html="true"></p>
          <input type="file" id="fileInput" accept=".csv,.tsv,.txt">
        </div>
        <div id="fileName" class="file-name hidden"></div>
      </div>

      <div id="input-tab-text" class="input-tab-content">
        <textarea id="textInput"></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="loadBtn" data-i18n="loadBtn"></button>
      </div>
      <div id="loadMsg" class="hidden"></div>
    </div>
  </div>

  <!-- Step 2: プレビュー -->
  <div class="step-panel" id="step1">
    <div class="card">
      <h2 data-i18n="dataPreview"></h2>
      <p class="preview-info" id="previewInfo"></p>
      <div class="table-wrap" id="previewTableWrap"></div>
      <div class="btn-group">
        <button class="btn btn-secondary" id="backToInputBtn" data-i18n="backToInput"></button>
        <button class="btn btn-primary" id="goToExtractBtn" data-i18n="goToExtract"></button>
      </div>
    </div>
  </div>

  <!-- Step 3: 抽出設定・結果 -->
  <div class="step-panel" id="step2">
    <div class="card">
      <h2 data-i18n="extractSettings"></h2>
      <div class="settings-row">
        <label for="colSelect" data-i18n="targetCol"></label>
        <select id="colSelect"></select>
      </div>
      <div id="colSamplePreview" class="col-sample-preview hidden"></div>
      <div class="settings-row">
        <label data-i18n="extractType"></label>
        <div class="radio-group" id="extractTypeGroup">
          <label><input type="radio" name="extractType" value="hashtag" checked> <span data-i18n="type_hashtag"></span></label>
          <label><input type="radio" name="extractType" value="mention"> <span data-i18n="type_mention"></span></label>
          <label><input type="radio" name="extractType" value="url"> <span data-i18n="type_url"></span></label>
          <label><input type="radio" name="extractType" value="email"> <span data-i18n="type_email"></span></label>
          <label><input type="radio" name="extractType" value="phone"> <span data-i18n="type_phone"></span></label>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" id="backToPreviewBtn" data-i18n="backToPreview"></button>
        <button class="btn btn-primary" id="extractBtn" data-i18n="runExtract"></button>
      </div>
    </div>

    <div class="card hidden" id="resultCard">
      <div class="result-header">
        <h2 style="margin-bottom: 0; border: none; padding: 0;" data-i18n="extractResult"></h2>
        <div>
          <span class="stats" id="stats"></span>
          <button class="btn btn-success" id="downloadBtn" style="margin-left: 8px;" data-i18n="csvDownload"></button>
        </div>
      </div>
      <div class="table-wrap" id="resultTableWrap"></div>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
